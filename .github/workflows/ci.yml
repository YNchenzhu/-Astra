# Minimum-viable CI.
#
# Why this file exists: the repo previously had no CI at all, which is why
# 329 eslint errors and a full duplicated-function-plus-dead-reexport chain
# could live across a refactor. Three gates is enough to prevent the whole
# class of "static-analysis already caught it, nobody ran it" bugs:
#
#   1. `tsc -b` — surfaces type errors AND, now that `noUnusedLocals` is
#       on in tsconfig.{app,electron}.json, every dead import.
#   2. `eslint .` — the same rules people use locally, now enforced.
#   3. `vitest run` — unit tests (kept non-blocking behaviour out of CI;
#       these are pure, fast, no network).
#
# Electron packaging (`npm run electron:build`) is *not* in CI: it downloads
# large native binaries and is a release-time artefact, not a per-PR gate.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc -b)
        run: npm run typecheck

      - name: Lint (eslint .)
        run: npm run lint

      - name: Unit tests (vitest run)
        run: npx vitest run --reporter=default
